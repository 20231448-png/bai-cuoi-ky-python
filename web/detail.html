{% extends "base.html" %}
{% block title %}Sửa bệnh nhân{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="card shadow-sm mx-auto" style="max-width: 900px;">
        <div class="card-body p-4">
            <h2 class="mb-4">Sửa bệnh nhân</h2>

            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                        <input type="text" name="full_name" class="form-control" value="{{ patient.full_name }}" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Giới tính</label>
                        <select name="gender" class="form-select">
                            <option value="">Chọn giới tính</option>
                            <option value="male" {% if patient.gender == 'male' %}selected{% endif %}>Nam</option>
                            <option value="female" {% if patient.gender == 'female' %}selected{% endif %}>Nữ</option>
                            <option value="other" {% if patient.gender == 'other' %}selected{% endif %}>Khác</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Ngày sinh</label>
                        <input type="date" name="date_of_birth" class="form-control" value="{{ patient.date_of_birth }}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Số điện thoại</label>
                        <input type="text" name="phone" class="form-control" value="{{ patient.phone }}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ patient.email }}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Địa chỉ</label>
                        <input type="text" name="address" class="form-control" value="{{ patient.address }}">
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-warning">Cập nhật bệnh nhân</button>
                    <a href="{{ url_for('patient.index') }}" class="btn btn-secondary">Quay lại</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
